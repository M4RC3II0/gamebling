<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #game { margin: 20px; }
        #history { margin-top: 20px; }
        .hidden { display: none; }
        .card { width: 50px; height: 70px; border: 1px solid; display: inline-block; margin: 2px; }
        .card.flipped { animation: flip 0.6s forwards; }
        @keyframes flip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
            100% { transform: rotateY(0deg); }
        }
    </style>
</head>
<body>
    <div id="game">
        <h1>Blackjack</h1>
        <div id="balance">Balance: $100</div>
        <div id="history"><h2>History</h2><ul></ul></div>
        <div id="buttons">
            <button id="hit">Hit</button>
            <button id="stand">Stand</button>
            <button id="double">Double</button>
        </div>
        <div id="current-deck" class="hidden"></div>
        <div id="status">Game Status: <span id="status-message"></span></div>
    </div>
    <script>
        let deck = [];
        let playerHand = [];
        let dealerHand = [];
        let balance = 100;
        let doubleDown = false;
        let history = [];

        function createDeck() {
            const suits = ['Hearts', 'Diamonds', 'Clubs', 'Spades'];
            const values = ['2', '3', '4', '5', '6', '7', '8', '9', '10', 'Jack', 'Queen', 'King', 'Ace'];
            suits.forEach(suit => {
                values.forEach(value => {
                    deck.push({value, suit});
                });
            });
            deck = shuffle(deck);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function calculateHandValue(hand) {
            let value = 0;
            let aces = 0;
            hand.forEach(card => {
                if (card.value === 'Jack' || card.value === 'Queen' || card.value === 'King') {
                    value += 10;
                } else if (card.value === 'Ace') {
                    aces++;
                    value += 11;
                } else {
                    value += parseInt(card.value);
                }
            });
            while (value > 21 && aces) {
                value -= 10;
                aces--;
            }
            return value;
        }

        function startGame() {
            createDeck();
            playerHand = [];
            dealerHand = [];
            balance -= 10;
            document.getElementById('balance').innerText = `Balance: $${balance}`;
            playerHand.push(deck.pop(), deck.pop());
            dealerHand.push(deck.pop(), deck.pop());
            if (calculateHandValue(playerHand) === 21) {
                endGame('blackjack');
            } else {
                updateStatus();
            }
        }

        function updateStatus() {
            const playerValue = calculateHandValue(playerHand);
            document.getElementById('status-message').innerText = `Player: ${playerValue}, Dealer: ?`;
        }

        function hit() {
            if (calculateHandValue(playerHand) <= 21) {
                playerHand.push(deck.pop());
                const playerValue = calculateHandValue(playerHand);
                if (playerValue > 21) {
                    endGame('bust');
                } else {
                    updateStatus();
                }
            }
        }

        function stand() {
            finishGame();
        }

        function double() {
            balance -= 10;
            doubleDown = true;
            hit();
            if (calculateHandValue(playerHand) <= 21) {
                finishGame();
            }
        }

        function finishGame() {
            let playerValue = calculateHandValue(playerHand);
            let dealerValue = calculateHandValue(dealerHand);
            while (dealerValue < 17) {
                dealerHand.push(deck.pop());
                dealerValue = calculateHandValue(dealerHand);
            }
            if (playerValue > 21) {
                endGame('bust');
            } else if (dealerValue > 21 || playerValue > dealerValue) {
                endGame('win');
            } else if (playerValue < dealerValue) {
                endGame('loss');
            } else {
                endGame('push');
            }
        }

        function endGame(result) {
            let message;
            switch(result) {
                case 'blackjack':
                    balance += 30;
                    message = 'Blackjack! You win $30.';
                    break;
                case 'win':
                    balance += doubleDown ? 20 : 10;
                    message = `You win ${doubleDown ? 'double' : '10'}`;
                    break;
                case 'loss':
                    message = 'You lose!';
                    break;
                case 'push':
                    message = 'Push!';
                    break;
                case 'bust':
                    message = 'You bust!';
                    break;
            }
            history.push({result: result, balance: balance});
            updateHistory();
            document.getElementById('status-message').innerText = message;
        }

        function updateHistory() {
            const historyList = document.querySelector('#history ul');
            historyList.innerHTML = '';
            history.forEach(entry => {
                const li = document.createElement('li');
                li.innerText = `Result: ${entry.result}, Balance: $${entry.balance}`;
                historyList.appendChild(li);
            });
        }

        document.getElementById('hit').addEventListener('click', hit);
        document.getElementById('stand').addEventListener('click', stand);
        document.getElementById('double').addEventListener('click', double);
        startGame();
    </script>
</body>
</html>
