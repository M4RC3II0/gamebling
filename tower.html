<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower — Gamebling</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0d1117;
    --bg-panel: #161c27;
    --bg-card: #1e2535;
    --bg-card2: #252d3e;
    --border: #2a3347;
    --blue: #3b7dff;
    --blue-glow: rgba(59,125,255,0.35);
    --green: #00e676;
    --green-glow: rgba(0,230,118,0.4);
    --red: #ff3d57;
    --red-glow: rgba(255,61,87,0.4);
    --gold: #ffd700;
    --text: #c8d0e0;
    --text-dim: #5a6580;
    --text-bright: #eaf0ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg-deep);
    font-family: 'Exo 2', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 58px;
    position: sticky; top:0; z-index:100;
  }
  .logo-area { display:flex; align-items:center; gap:14px; }
  .back-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-weight: 600;
    font-size: .85rem;
    padding: 6px 14px;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items:center; gap:6px;
  }
  .back-btn:hover { border-color: var(--blue); color: var(--blue); }
  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-bright);
    letter-spacing: 1px;
    text-decoration: none;
  }
  .logo span { color: var(--blue); }
  .header-right { display:flex; align-items:center; gap:12px; }
  .balance-pill {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 16px;
    font-weight: 700;
    font-size: .95rem;
    color: var(--gold);
    display: flex; align-items:center; gap:8px;
  }

  .layout {
    display: flex;
    gap: 0;
    height: calc(100vh - 58px);
  }

  .left-panel {
    width: 300px;
    min-width: 260px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
  }
  .field-label {
    font-size: .75rem;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-bottom: 6px;
  }
  .input-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
  }
  .input-wrap input {
    flex:1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-bright);
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 10px 0;
  }
  .input-wrap .dollar { color: var(--text-dim); font-size: .9rem; }
  .half-double { display: flex; gap: 6px; }
  .hd-btn {
    background: var(--bg-card2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
    font-size: .85rem;
    padding: 7px 14px;
    cursor: pointer;
    transition: background .15s;
  }
  .hd-btn:hover { background: var(--border); }

  .select-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    padding: 0 12px;
  }
  .select-wrap select {
    flex:1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-bright);
    font-family: 'Exo 2', sans-serif;
    font-weight: 600;
    font-size: .9rem;
    padding: 10px 0;
    cursor: pointer;
    appearance: none;
  }
  .select-wrap select option { background: var(--bg-card2); }
  .chevron { color: var(--text-dim); font-size: .8rem; pointer-events:none; }

  .stats-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 14px 16px;
  }
  .stat-item { text-align:center; }
  .stat-label { font-size:.7rem; color:var(--text-dim); font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
  .stat-val { font-size:1.05rem; font-weight:700; color:var(--green); }
  .stat-val.neutral { color:var(--text-bright); }
  .stat-arrow { color:var(--text-dim); font-size:1.1rem; }
  .stats-mult {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    align-items: center;
    padding: 8px 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
  }
  .stats-mult .stat-val { font-size:.9rem; }
  .stats-mult .divider { width:1px; background:var(--border); height:28px; }

  .bet-btn {
    background: var(--blue);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 14px;
    cursor: pointer;
    width: 100%;
    box-shadow: 0 0 20px var(--blue-glow);
    transition: all .2s;
  }
  .bet-btn:hover { box-shadow: 0 0 36px var(--blue-glow); transform: translateY(-1px); }
  .bet-btn:disabled { background:var(--bg-card2); color:var(--text-dim); box-shadow:none; cursor:not-allowed; transform:none; }

  .cashout-btn {
    background: linear-gradient(135deg, #00c853, #00e676);
    border: none;
    border-radius: 10px;
    color: #001a0a;
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 14px;
    cursor: pointer;
    width: 100%;
    box-shadow: 0 0 24px var(--green-glow);
    transition: all .2s;
    display: none;
  }
  .cashout-btn:hover { box-shadow: 0 0 40px var(--green-glow); transform: translateY(-1px); }

  .current-mult-badge {
    display:none;
    background: rgba(0,230,118,.12);
    border:1px solid rgba(0,230,118,.3);
    border-radius:8px;
    padding:10px 14px;
    text-align:center;
    font-weight:700;
    color:var(--green);
    font-size:.95rem;
  }

  .demo-hint {
    text-align: center;
    font-size: .8rem;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
  }

  /* TOWER AREA */
  .tower-area {
    flex:1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .tower-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-panel);
  }
  .tower-icon { font-size:1.2rem; }
  .tower-title { font-family:'Rajdhani',sans-serif; font-size:1.25rem; font-weight:700; color:var(--text-bright); letter-spacing:.05em; }

  .tower-container {
    flex:1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    background: var(--bg-deep);
    background-image:
      radial-gradient(ellipse at 20% 80%, rgba(59,125,255,.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,230,118,.04) 0%, transparent 60%);
  }
  .tower-grid-wrap {
    display:flex;
    flex-direction:column;
    gap:8px;
    width:100%;
    max-width:600px;
  }
  .tower-row { display:grid; gap:8px; transition:opacity .3s; }
  .tower-row.cols-2 { grid-template-columns:1fr 1fr; }
  .tower-row.cols-3 { grid-template-columns:1fr 1fr 1fr; }

  .tower-cell {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all .2s;
    flex-direction: column;
    gap: 5px;
  }
  .tower-cell:hover:not(.disabled):not(.revealed) {
    border-color: var(--blue);
    background: var(--bg-card2);
    box-shadow: 0 0 18px var(--blue-glow);
    transform: scale(1.02);
  }
  .tower-cell.disabled { cursor:default; opacity:.4; }
  .tower-cell.active-row:not(.revealed) {
    border-color: rgba(59,125,255,.5);
    animation: pulse-border 1.6s infinite;
  }
  @keyframes pulse-border {
    0%,100% { box-shadow:0 0 8px var(--blue-glow); }
    50% { box-shadow:0 0 22px var(--blue-glow), 0 0 4px var(--blue); }
  }
  .tower-cell.win { background:rgba(0,230,118,.12); border-color:var(--green); box-shadow:0 0 28px var(--green-glow); animation:none; cursor:default; }
  .tower-cell.lose { background:rgba(255,61,87,.12); border-color:var(--red); box-shadow:0 0 28px var(--red-glow); animation:none; cursor:default; }
  .tower-cell.safe-reveal { background:rgba(0,230,118,.06); border-color:rgba(0,230,118,.3); cursor:default; }
  .tower-cell.bomb-reveal { background:rgba(255,61,87,.06); border-color:rgba(255,61,87,.3); cursor:default; }

  .cell-gem { font-size:1.6rem; filter:drop-shadow(0 0 6px rgba(0,230,118,.5)); }
  .cell-gem.bomb { font-size:1.7rem; filter:drop-shadow(0 0 6px rgba(255,61,87,.6)); }
  .cell-mult { font-family:'Rajdhani',sans-serif; font-size:.85rem; font-weight:700; color:var(--green); letter-spacing:.03em; }
  .cell-empty { width:28px; height:28px; background:var(--bg-card2); border-radius:50%; opacity:.3; }

  /* RESULT */
  .result-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); display:none; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(4px); }
  .result-overlay.show { display:flex; }
  .result-card { background:var(--bg-panel); border:1px solid var(--border); border-radius:20px; padding:40px 50px; text-align:center; max-width:380px; width:90%; animation:pop-in .3s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop-in { from{transform:scale(.7);opacity:0;} to{transform:scale(1);opacity:1;} }
  .result-emoji { font-size:4rem; margin-bottom:14px; display:block; }
  .result-title { font-family:'Rajdhani',sans-serif; font-size:2rem; font-weight:700; margin-bottom:8px; }
  .result-title.win-title { color:var(--green); text-shadow:0 0 20px var(--green-glow); }
  .result-title.lose-title { color:var(--red); text-shadow:0 0 20px var(--red-glow); }
  .result-sub { color:var(--text-dim); font-size:.95rem; margin-bottom:8px; }
  .result-amount { font-size:1.6rem; font-weight:700; margin-bottom:24px; }
  .result-amount.win-amt { color:var(--gold); }
  .result-amount.lose-amt { color:var(--red); }
  .result-close { background:var(--blue); border:none; border-radius:10px; color:#fff; font-family:'Exo 2',sans-serif; font-weight:700; font-size:1rem; padding:12px 32px; cursor:pointer; box-shadow:0 0 16px var(--blue-glow); transition:all .2s; }
  .result-close:hover { box-shadow:0 0 28px var(--blue-glow); }
  .pattern-reveal { margin:12px 0 20px; display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; }
  .pattern-row { display:flex; gap:6px; justify-content:center; }
  .pattern-cell { width:38px; height:32px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:.95rem; border:1px solid transparent; }
  .pattern-cell.p-safe { background:rgba(0,230,118,.15); border-color:rgba(0,230,118,.3); }
  .pattern-cell.p-bomb { background:rgba(255,61,87,.15); border-color:rgba(255,61,87,.3); }
  .pattern-cell.p-chosen { outline:2px solid var(--blue); outline-offset:1px; }

  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }

  .flame-deco { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); font-size:2rem; animation:flicker 1.2s ease-in-out infinite alternate; pointer-events:none; z-index:0; opacity:.2; }
  @keyframes flicker { from{opacity:.1;transform:translateX(-50%) scale(.95);} to{opacity:.3;transform:translateX(-50%) scale(1.05);} }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <button class="back-btn" onclick="window.location.href='gamebling.html'">← Lobby</button>
    <a class="logo" href="gamebling.html">GAME<span>BLING</span></a>
  </div>
  <div class="header-right">
    <div class="balance-pill">💰 $<span id="header-balance">1000.00</span></div>
  </div>
</header>

<div class="layout">
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div>
      <div class="field-label">Bet Amount</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="input-wrap" style="flex:1;">
          <span class="dollar">$</span>
          <input type="number" id="bet-input" value="1.00" min="0.01" step="0.01">
        </div>
        <div class="half-double">
          <button class="hd-btn" onclick="halfBet()">½</button>
          <button class="hd-btn" onclick="doubleBet()">2×</button>
        </div>
      </div>
    </div>

    <div>
      <div class="field-label">Risk</div>
      <div class="select-wrap">
        <select id="risk-select" onchange="onRiskChange()">
          <option value="easy">Easy — 3 tiles, 1 bomb (×1.28)</option>
          <option value="medium">Medium — 3 tiles, 2 bombs (×2.56)</option>
          <option value="hard" selected>Hard — 2 tiles, 1 bomb (×1.92)</option>
        </select>
        <span class="chevron">▼</span>
      </div>
    </div>

    <div class="current-mult-badge" id="mult-badge">
      Current Mult: ×<span id="cur-mult-display">0</span>
    </div>

    <div>
      <div class="stats-box">
        <div class="stat-item">
          <div class="stat-label">Curr. Profit</div>
          <div class="stat-val" id="cur-profit">$0.00</div>
        </div>
        <span class="stat-arrow">›</span>
        <div class="stat-item">
          <div class="stat-label">Next Profit</div>
          <div class="stat-val neutral" id="next-profit">$0.00</div>
        </div>
      </div>
      <div class="stats-mult">
        <div class="stat-item"><div class="stat-val neutral" id="cur-mult">0×</div></div>
        <div class="divider"></div>
        <div class="stat-item"><div class="stat-val neutral" id="next-mult">1.92×</div></div>
      </div>
    </div>

    <button class="bet-btn" id="bet-btn" onclick="startGame()">🏰 Place Bet</button>
    <button class="cashout-btn" id="cashout-btn" onclick="cashOut()">💰 Cash Out</button>

    <div class="demo-hint">Balance: $<span id="side-balance">1000.00</span></div>
  </div>

  <!-- TOWER -->
  <div class="tower-area">
    <div class="tower-header">
      <span class="tower-icon">🏰</span>
      <span class="tower-title">TOWER — Climb to win</span>
    </div>
    <div class="tower-container">
      <div class="tower-grid-wrap" id="tower-grid"></div>
    </div>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div class="result-overlay" id="result-overlay">
  <div class="result-card">
    <span class="result-emoji" id="res-emoji">🎉</span>
    <div class="result-title" id="res-title">You Win!</div>
    <div class="result-sub" id="res-sub">Cashed out at ×3.84</div>
    <div class="result-amount" id="res-amount">+$7.68</div>
    <div class="pattern-reveal" id="pattern-reveal"></div>
    <button class="result-close" onclick="closeResult()">Play Again</button>
  </div>
</div>

<div class="flame-deco">🔥</div>

<script>
// ── SHARED BALANCE ─────────────────────────────────────────────────────────
const BALANCE_KEY = 'gamebling_balance';
const GAME_KEY = 'tower_game_state';
const TOTAL_ROWS = 8;

function getSharedBalance() {
  const raw = localStorage.getItem(BALANCE_KEY);
  return raw ? parseFloat(raw) : 1000;
}
function saveSharedBalance(b) {
  localStorage.setItem(BALANCE_KEY, b.toFixed(2));
}

// ── STATE ──────────────────────────────────────────────────────────────────
let state = {
  inGame: false,
  betAmount: 1,
  risk: 'hard',
  currentRow: 0,
  currentMult: 0,
  grid: [],
  cols: 2,
  bombs: 1,
};

function saveState() {
  try { localStorage.setItem(GAME_KEY, JSON.stringify(state)); } catch(e){}
}
function loadState() {
  try {
    const raw = localStorage.getItem(GAME_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
  } catch(e){}
}

function getRiskConfig(risk) {
  switch(risk) {
    case 'easy':   return { cols:3, bombs:1, baseMult:1.28, rowMult:1.44 };
    case 'medium': return { cols:3, bombs:2, baseMult:2.56, rowMult:2.90 };
    case 'hard':   return { cols:2, bombs:1, baseMult:1.92, rowMult:2.00 };
    default:       return { cols:2, bombs:1, baseMult:1.92, rowMult:2.00 };
  }
}

function generateGrid(rows, cols, bombs) {
  const grid = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    const bombPositions = new Set();
    while (bombPositions.size < bombs) bombPositions.add(Math.floor(Math.random() * cols));
    for (let c = 0; c < cols; c++) row.push({ isBomb: bombPositions.has(c), chosen:false, revealed:false });
    grid.push(row);
  }
  return grid;
}

function multForRow(row) {
  const cfg = getRiskConfig(state.risk);
  return +(cfg.baseMult * Math.pow(cfg.rowMult, row)).toFixed(2);
}

function fmt(n) { return '$' + Math.abs(n).toFixed(2); }

function updateUI() {
  const bal = getSharedBalance();
  document.getElementById('header-balance').textContent = bal.toFixed(2);
  document.getElementById('side-balance').textContent = bal.toFixed(2);
  document.getElementById('bet-input').value = state.betAmount.toFixed(2);
  document.getElementById('risk-select').value = state.risk;

  const curMult = state.inGame ? multForRow(state.currentRow - 1) : 0;
  const nextMult = multForRow(state.currentRow);
  const curProfit = state.inGame && state.currentRow > 0 ? state.betAmount * curMult - state.betAmount : 0;
  const nextProfit = state.betAmount * nextMult - state.betAmount;

  document.getElementById('cur-profit').textContent = state.inGame && state.currentRow > 0 ? fmt(curProfit) : '$0.00';
  document.getElementById('next-profit').textContent = fmt(nextProfit);
  document.getElementById('cur-mult').textContent = state.inGame && state.currentRow > 0 ? curMult + '×' : '0×';
  document.getElementById('next-mult').textContent = nextMult + '×';

  const badge = document.getElementById('mult-badge');
  if (state.inGame && state.currentRow > 0) {
    badge.style.display = 'block';
    document.getElementById('cur-mult-display').textContent = curMult;
  } else { badge.style.display = 'none'; }

  const betBtn = document.getElementById('bet-btn');
  const cashBtn = document.getElementById('cashout-btn');
  if (state.inGame) {
    betBtn.style.display = 'none';
    cashBtn.style.display = state.currentRow > 0 ? 'block' : 'none';
  } else {
    betBtn.style.display = 'block';
    cashBtn.style.display = 'none';
    betBtn.disabled = bal < state.betAmount || state.betAmount <= 0;
  }
}

function renderTower() {
  const grid = document.getElementById('tower-grid');
  grid.innerHTML = '';
  const { cols } = getRiskConfig(state.risk);

  for (let r = TOTAL_ROWS - 1; r >= 0; r--) {
    const rowEl = document.createElement('div');
    rowEl.className = `tower-row cols-${cols}`;
    rowEl.dataset.row = r;
    const isActiveRow = state.inGame && r === state.currentRow;
    const isPastRow = state.inGame && r < state.currentRow;

    if (!state.inGame && state.grid.length === 0) {
      for (let c = 0; c < cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'tower-cell disabled';
        cell.innerHTML = `<div class="cell-empty"></div>`;
        rowEl.appendChild(cell);
      }
    } else if (state.grid.length > 0) {
      for (let c = 0; c < cols; c++) {
        const cell = document.createElement('div');
        const cellData = state.grid[r] ? state.grid[r][c] : null;
        let classes = 'tower-cell';
        if (isActiveRow) classes += ' active-row';
        if (!isActiveRow && !isPastRow) classes += ' disabled';
        let inner = '';
        const mult = multForRow(r);

        if (cellData && cellData.revealed) {
          if (cellData.chosen) {
            classes += cellData.isBomb ? ' lose' : ' win';
            inner = cellData.isBomb
              ? `<span class="cell-gem bomb">💥</span>`
              : `<span class="cell-gem">💎</span><span class="cell-mult">×${mult}</span>`;
          } else {
            classes += cellData.isBomb ? ' bomb-reveal' : ' safe-reveal';
            inner = cellData.isBomb ? `<span class="cell-gem bomb">💣</span>` : `<span class="cell-gem" style="opacity:.4">💎</span>`;
          }
        } else if (isPastRow && cellData && cellData.chosen) {
          classes += ' win';
          inner = `<span class="cell-gem">💎</span><span class="cell-mult">×${mult}</span>`;
        } else if (isPastRow) {
          classes += ' disabled';
          inner = `<div class="cell-empty"></div>`;
        } else if (isActiveRow) {
          inner = `<div class="cell-empty"></div>`;
        } else {
          classes += ' disabled';
          inner = `<div class="cell-empty"></div>`;
        }

        cell.className = classes;
        cell.innerHTML = inner;
        if (isActiveRow) cell.addEventListener('click', () => chooseCell(r, c));
        rowEl.appendChild(cell);
      }
    }

    grid.appendChild(rowEl);
  }
}

function startGame() {
  const bet = parseFloat(document.getElementById('bet-input').value);
  const bal = getSharedBalance();
  if (isNaN(bet) || bet <= 0 || bet > bal) return;

  const cfg = getRiskConfig(state.risk);
  state.betAmount = bet;
  saveSharedBalance(bal - bet);
  state.inGame = true;
  state.currentRow = 0;
  state.currentMult = 0;
  state.cols = cfg.cols;
  state.grid = generateGrid(TOTAL_ROWS, cfg.cols, cfg.bombs);
  saveState();
  updateUI();
  renderTower();
}

function chooseCell(row, col) {
  if (!state.inGame || row !== state.currentRow) return;
  const cell = state.grid[row][col];
  cell.chosen = true;
  cell.revealed = true;

  if (cell.isBomb) {
    revealAll();
    state.grid[row].forEach(c => { c.revealed = true; });
    renderTower();
    setTimeout(() => {
      showResult(false, 0, row);
      state.inGame = false;
      saveState();
      updateUI();
    }, 600);
  } else {
    state.currentRow++;
    if (state.currentRow === TOTAL_ROWS) {
      const mult = +(multForRow(TOTAL_ROWS - 1) * getRiskConfig(state.risk).rowMult).toFixed(2);
      const winnings = +(state.betAmount * mult).toFixed(2);
      saveSharedBalance(getSharedBalance() + winnings);
      state.inGame = false;
      revealAll();
      renderTower();
      setTimeout(() => showResult(true, winnings, TOTAL_ROWS - 1, true), 500);
      saveState();
      updateUI();
    } else {
      renderTower();
      updateUI();
      saveState();
    }
  }
}

function cashOut() {
  if (!state.inGame || state.currentRow === 0) return;
  const mult = multForRow(state.currentRow - 1);
  const winnings = +(state.betAmount * mult).toFixed(2);
  saveSharedBalance(getSharedBalance() + winnings);
  state.inGame = false;
  revealAll();
  renderTower();
  showResult(true, winnings, state.currentRow - 1);
  saveState();
  updateUI();
}

function revealAll() {
  if (!state.grid.length) return;
  state.grid.forEach(row => row.forEach(cell => { cell.revealed = true; }));
}

function showResult(won, amount, reachedRow, jackpot = false) {
  const overlay = document.getElementById('result-overlay');
  const mult = jackpot ? multForRow(TOTAL_ROWS - 1) * 2 : multForRow(reachedRow);
  document.getElementById('res-emoji').textContent = won ? (jackpot ? '🏆' : '🎉') : '💀';
  const titleEl = document.getElementById('res-title');
  titleEl.textContent = won ? (jackpot ? 'JACKPOT!' : 'Cashed Out!') : 'Busted!';
  titleEl.className = 'result-title ' + (won ? 'win-title' : 'lose-title');
  document.getElementById('res-sub').textContent = won ? `Cashed out at ×${mult}` : `Hit a bomb on row ${reachedRow + 1}`;
  const amtEl = document.getElementById('res-amount');
  amtEl.textContent = won ? `+${fmt(amount)} (×${mult})` : `-${fmt(state.betAmount)}`;
  amtEl.className = 'result-amount ' + (won ? 'win-amt' : 'lose-amt');

  const pr = document.getElementById('pattern-reveal');
  pr.innerHTML = '';
  if (state.grid.length) {
    for (let r = 0; r < TOTAL_ROWS; r++) {
      if (!state.grid[r]) continue;
      const rowDiv = document.createElement('div');
      rowDiv.className = 'pattern-row';
      state.grid[r].forEach(cell => {
        const cellDiv = document.createElement('div');
        let cls = 'pattern-cell ' + (cell.isBomb ? 'p-bomb' : 'p-safe');
        if (cell.chosen) cls += ' p-chosen';
        cellDiv.className = cls;
        cellDiv.textContent = cell.isBomb ? '💣' : '💎';
        rowDiv.appendChild(cellDiv);
      });
      pr.prepend(rowDiv);
    }
  }
  overlay.classList.add('show');
}

function closeResult() {
  document.getElementById('result-overlay').classList.remove('show');
  state.grid = [];
  renderTower();
  updateUI();
}

function halfBet() {
  const v = parseFloat(document.getElementById('bet-input').value) || 1;
  state.betAmount = Math.max(0.01, +(v / 2).toFixed(2));
  document.getElementById('bet-input').value = state.betAmount.toFixed(2);
  updateUI();
}
function doubleBet() {
  const v = parseFloat(document.getElementById('bet-input').value) || 1;
  state.betAmount = Math.min(getSharedBalance(), +(v * 2).toFixed(2));
  document.getElementById('bet-input').value = state.betAmount.toFixed(2);
  updateUI();
}
function onRiskChange() {
  if (state.inGame) return;
  state.risk = document.getElementById('risk-select').value;
  state.grid = [];
  renderTower();
  updateUI();
  saveState();
}
document.getElementById('bet-input').addEventListener('input', function() {
  state.betAmount = parseFloat(this.value) || 0;
  updateUI();
});

loadState();
if (state.inGame) { state.inGame = false; state.grid = []; }
renderTower();
updateUI();
</script>
